name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build, publish and deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/clinical-ai-api:latest
            ghcr.io/${{ github.repository_owner }}/clinical-ai-api:sha-${{ github.event.workflow_run.head_sha }}

      - name: Build and push Indexer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.indexer
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/clinical-ai-indexer:latest
            ghcr.io/${{ github.repository_owner }}/clinical-ai-indexer:sha-${{ github.event.workflow_run.head_sha }}

      - name: Deploy on VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          envs: GIT_SHA,GHCR_USER,GHCR_TOKEN
          script: |
            export GIT_SHA=${{ github.event.workflow_run.head_sha }}
            export GHCR_USER=${{ github.repository_owner }}
            export GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}'
            cd /opt/apps/clinical-ai
            bash ./scripts/deploy.sh
